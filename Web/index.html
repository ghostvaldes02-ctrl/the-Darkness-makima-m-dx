 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAKIMA M-DX · Connexion sécurisée</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(145deg, #0a0a0f 0%, #0f0f1a 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { max-width: 500px; width: 100%; background: rgba(20,20,30,0.7); backdrop-filter: blur(12px); border-radius: 2rem; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 45px rgba(0,0,0,0.5); }
        .header { padding: 1.8rem 2rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h1 { font-size: 1.9rem; font-weight: 700; background: linear-gradient(135deg, #fff, #b87cff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header p { color: #a0a0b0; margin-top: 0.5rem; font-size: 0.9rem; }
        .content { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: #d0d0e0; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.85rem; }
        input { width: 100%; background: #12121c; border: 1px solid #2a2a3a; padding: 1rem 1.2rem; border-radius: 1.2rem; color: white; font-size: 1rem; outline: none; }
        input:focus { border-color: #b87cff; box-shadow: 0 0 0 3px rgba(184,124,255,0.2); }
        button { width: 100%; background: linear-gradient(95deg, #9b5eff, #c084fc); border: none; padding: 1rem; border-radius: 1.5rem; font-weight: 600; font-size: 1rem; color: white; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .code-box { margin-top: 1.8rem; background: #0c0c14; border-radius: 1.2rem; padding: 1rem; text-align: center; border: 1px dashed #3a3a4a; }
        .code-box span { font-size: 0.8rem; color: #9ca3af; display: block; margin-bottom: 0.5rem; }
        .code { font-family: monospace; font-size: 2.2rem; font-weight: bold; letter-spacing: 8px; color: #c084fc; background: #00000040; padding: 0.5rem; border-radius: 1rem; }
        .error { color: #ff8a8a; background: #ffd8d820; border-radius: 1rem; padding: 0.8rem; margin-top: 1rem; font-size: 0.85rem; text-align: center; }
        .footer { padding: 1.2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; color: #5f5f7a; }
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>⚡ MAKIMA M-DX</h1>
        <p>Authentification par code d'appairage</p>
    </div>
    <div class="content">
        <div class="form-group">
            <label>📱 Numéro WhatsApp (indicatif pays)</label>
            <input type="tel" id="phone" placeholder="ex: 237671410035" autocomplete="off">
        </div>
        <button id="pairBtn">🔐 Obtenir le code d'appairage</button>
        <div id="result" style="margin-top: 1.5rem;"></div>
    </div>
    <div class="footer">
        © 2025 THE DARKNESS — MAKIMA M-DX | Authentification par code
    </div>
</div>
<script>
    const btn = document.getElementById('pairBtn');
    const phoneInput = document.getElementById('phone');
    const resultDiv = document.getElementById('result');

    btn.addEventListener('click', async () => {
        let number = phoneInput.value.trim();
        if (!number) {
            resultDiv.innerHTML = `<div class="error">❌ Veuillez entrer un numéro avec indicatif (ex: 237671410035)</div>`;
            return;
        }
        const rawNumber = number.replace(/\D/g, '');
        if (rawNumber.length < 9) {
            resultDiv.innerHTML = `<div class="error">❌ Numéro trop court (indicatif + numéro requis)</div>`;
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Génération en cours...';
        resultDiv.innerHTML = `<div style="text-align:center;color:#a0a0b0;">⏳ Demande envoyée, le code apparaîtra dans quelques secondes...</div>`;

        try {
            const response = await fetch('/api/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number: rawNumber })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Erreur inconnue');
            resultDiv.innerHTML = `
                <div class="code-box">
                    <span>✅ Code d'appairage (valable 60 secondes)</span>
                    <div class="code">${data.code}</div>
                    <div style="margin-top:0.7rem;font-size:0.75rem;">Saisissez ce code dans WhatsApp → Appareils liés → Lier avec un code à 8 chiffres</div>
                </div>
            `;
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">❌ ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🔐 Obtenir le code d\'appairage';
        }
    });
</script>
</body>
</html>
